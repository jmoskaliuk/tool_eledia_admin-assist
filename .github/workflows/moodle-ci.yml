name: Moodle Plugin CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        moodle-branch: [MOODLE_405_STABLE, MOODLE_500_STABLE]
        database: [pgsql]
        php: ['8.3']

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: moodle
          POSTGRES_PASSWORD: moodle
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pgsql, zip, gd, intl, mbstring, xml, curl, soap
          ini-values: max_input_vars=5000
          coverage: none

      - name: Setup Moodle locale
        run: |
          sudo locale-gen en_AU.UTF-8
          sudo update-locale LANG=en_AU.UTF-8

      - name: Install moodle-plugin-ci
        run: |
          composer create-project --no-interaction --prefer-dist moodlehq/moodle-plugin-ci "$RUNNER_TEMP/moodle-plugin-ci-tool" "^4"

      - name: Add moodle-plugin-ci to PATH
        run: echo "$RUNNER_TEMP/moodle-plugin-ci-tool/bin" >> "$GITHUB_PATH"

      - name: Install Moodle
        run: |
          MOODLE_CI_DIR="$RUNNER_TEMP/moodle-plugin-ci"
          mkdir -p "$MOODLE_CI_DIR"
          cd "$MOODLE_CI_DIR"
          moodle-plugin-ci install \
            --plugin="$GITHUB_WORKSPACE" \
            --moodle=${{ matrix.moodle-branch }} \
            --branch=${{ github.head_ref || github.ref_name }} \
            --db-type=${{ matrix.database }} \
            --db-host=127.0.0.1 \
            --db-name=moodle \
            --db-user=moodle \
            --db-pass=moodle

      - name: PHP lint
        run: cd "$RUNNER_TEMP/moodle-plugin-ci" && moodle-plugin-ci phplint

      - name: Code style
        run: cd "$RUNNER_TEMP/moodle-plugin-ci" && moodle-plugin-ci phpcs --max-warnings 0

      - name: PHPDoc
        run: cd "$RUNNER_TEMP/moodle-plugin-ci" && moodle-plugin-ci phpdoc --max-warnings 0

      - name: Validate plugin
        run: cd "$RUNNER_TEMP/moodle-plugin-ci" && moodle-plugin-ci validate

      - name: PHPUnit
        run: cd "$RUNNER_TEMP/moodle-plugin-ci" && moodle-plugin-ci phpunit --fail-on-warning
