name: Moodle Plugin CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        moodle-branch: [MOODLE_405_STABLE, MOODLE_500_STABLE]
        database: [pgsql]
        php: ['8.3']

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: moodle
          POSTGRES_PASSWORD: moodle
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pgsql, zip, gd, intl, mbstring, xml, curl, soap
          ini-values: max_input_vars=5000
          coverage: none

      - name: Install moodle-plugin-ci
        run: |
          composer global config repositories.moodle-local_ci vcs https://github.com/moodlehq/moodle-local_ci.git
          composer global config repositories.moodle-local_moodlecheck --json '{"type":"package","package":{"name":"moodlehq/moodle-local_moodlecheck","version":"1.3.2","source":{"url":"https://github.com/moodlehq/moodle-local_moodlecheck.git","type":"git","reference":"v1.3.2"}}}'
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require moodlehq/moodle-plugin-ci:^4 --no-interaction --prefer-dist

      - name: Add composer global bin to PATH
        run: echo "$(composer global config home)/vendor/bin" >> "$GITHUB_PATH"

      - name: Install Moodle
        run: |
          MOODLE_CI_DIR="$RUNNER_TEMP/moodle-plugin-ci"
          mkdir -p "$MOODLE_CI_DIR"
          cd "$MOODLE_CI_DIR"
          moodle-plugin-ci install \
            --plugin="$GITHUB_WORKSPACE" \
            --moodle=${{ matrix.moodle-branch }} \
            --branch=${{ github.head_ref || github.ref_name }} \
            --db-type=${{ matrix.database }} \
            --db-host=127.0.0.1 \
            --db-name=moodle \
            --db-user=moodle \
            --db-pass=moodle

      - name: PHP lint
        run: cd "$RUNNER_TEMP/moodle-plugin-ci" && moodle-plugin-ci phplint

      - name: Code style
        run: cd "$RUNNER_TEMP/moodle-plugin-ci" && moodle-plugin-ci phpcs --max-warnings 0

      - name: PHPDoc
        run: cd "$RUNNER_TEMP/moodle-plugin-ci" && moodle-plugin-ci phpdoc --max-warnings 0

      - name: Validate plugin
        run: cd "$RUNNER_TEMP/moodle-plugin-ci" && moodle-plugin-ci validate

      - name: PHPUnit
        run: cd "$RUNNER_TEMP/moodle-plugin-ci" && moodle-plugin-ci phpunit --fail-on-warning
